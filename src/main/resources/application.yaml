spring:
  application:
    name: api-toko

  banner:
    location: classpath:banner.txt

  datasource:
    url: jdbc:postgresql://localhost:5432/db_toko
    username: toko_user
    password: toko_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.threepm.api.toko: DEBUG
    org.springframework.security: INFO

app:
  name: 3PM Backend Test API Toko
  version: 0.0.1

  security:
    jwt-secret: ${JWT_SECRET:3pm-backend-test-secret-key-minimum-32-characters}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    permit-all: ${APP_SECURITY_PERMIT_ALL:false}